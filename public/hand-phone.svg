<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="100%" height="100%" fill="none">
  <defs>
    {/* Gradients for UI elements */}
    <linearGradient id="screen-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d0e12" />
      <stop offset="100%" stop-color="#15171e" />
    </linearGradient>
    
    <linearGradient id="phone-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7a00" />
      <stop offset="50%" stop-color="#ff005c" />
      <stop offset="100%" stop-color="#7a00ff" />
    </linearGradient>

    <linearGradient id="chart-grad-1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff7a00" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#ff7a00" stop-opacity="0" />
    </linearGradient>

    <linearGradient id="chart-line-1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7a00" />
      <stop offset="100%" stop-color="#ff005c" />
    </linearGradient>

    <linearGradient id="chart-line-2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <linearGradient id="hand-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2d2621" />
      <stop offset="100%" stop-color="#40352e" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  {/* Background glow behind phone */}
  <circle cx="250" cy="280" r="140" fill="url(#phone-glow)" opacity="0.15" filter="url(#glow)" />

  {/* Smartphone Body */}
  {/* Outer Shadow/Glow Border */}
  <rect x="128" y="38" width="244" height="484" rx="42" stroke="url(#phone-glow)" stroke-width="1.5" stroke-opacity="0.3" />
  {/* Phone Case */}
  <rect x="130" y="40" width="240" height="480" rx="40" fill="#1b1d24" stroke="#2d313f" stroke-width="4" />
  {/* Screen Area */}
  <rect x="140" y="50" width="220" height="460" rx="30" fill="url(#screen-bg)" />

  {/* Dynamic Island / Notch */}
  <rect x="205" y="58" width="90" height="22" rx="11" fill="#000000" />
  <circle cx="220" cy="69" r="3.5" fill="#101015" />
  <circle cx="280" cy="69" r="2.5" fill="#08081a" />

  {/* --- Screen Content (Dashboard UI) --- */}
  {/* Status Bar */}
  <text x="165" y="75" fill="#ffffff" font-size="10" font-family="sans-serif" font-weight="600" opacity="0.8">9:41</text>
  <path d="M315 67h12v6h-12z" stroke="#ffffff" stroke-opacity="0.8" stroke-width="1" />
  <path d="M329 69v2h1v-2z" fill="#ffffff" fill-opacity="0.8" />
  <path d="M305 73h2v-2h-2zm-4 0h2v-4h-2zm-4 0h2v-6h-2z" fill="#ffffff" fill-opacity="0.8" />

  {/* App Header */}
  <text x="160" y="110" fill="#ffffff" font-size="11" font-family="sans-serif" font-weight="700" letter-spacing="1" opacity="0.4">ENGAGEIQ</text>
  <text x="160" y="130" fill="#ffffff" font-size="18" font-family="sans-serif" font-weight="700">Dashboard</text>

  {/* Card 1: Growth Chart */}
  <rect x="156" y="150" width="188" height="150" rx="16" fill="#1d202b" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
  <text x="170" y="174" fill="#a0a5b5" font-size="10" font-family="sans-serif" font-weight="600">TOTAL ENGAGEMENT</text>
  <text x="170" y="196" fill="#ffffff" font-size="20" font-family="sans-serif" font-weight="700">92,480</text>
  <text x="274" y="195" fill="#34d399" font-size="10" font-family="sans-serif" font-weight="600">+14.2%</text>

  {/* Area Chart Fill */}
  <path d="M 170 280 L 170 240 Q 200 210 220 230 T 280 200 T 330 220 L 330 280 Z" fill="url(#chart-grad-1)" />
  {/* Area Chart Line */}
  <path d="M 170 240 Q 200 210 220 230 T 280 200 T 330 220" stroke="url(#chart-line-1)" stroke-width="3" stroke-linecap="round" />
  {/* Indicator Dot */}
  <circle cx="280" cy="200" r="4" fill="#ffffff" filter="url(#glow)" />
  <circle cx="280" cy="200" r="1.5" fill="#ff005c" />

  {/* Card 2: Campaign success Ring */}
  <rect x="156" y="312" width="188" height="92" rx="16" fill="#1d202b" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
  <text x="170" y="336" fill="#a0a5b5" font-size="10" font-family="sans-serif" font-weight="600">DELIVERY RATE</text>
  <text x="170" y="360" fill="#ffffff" font-size="20" font-family="sans-serif" font-weight="700">99.8%</text>
  <text x="170" y="382" fill="#a0a5b5" font-size="9" font-family="sans-serif">Campaign: Welcome Loop</text>
  
  {/* Circular Progress Gauge */}
  <circle cx="304" cy="358" r="22" stroke="#2a2f3f" stroke-width="5" />
  <circle cx="304" cy="358" r="22" stroke="url(#chart-line-2)" stroke-width="5" stroke-dasharray="138" stroke-dashoffset="15" stroke-linecap="round" transform="rotate(-90 304 358)" />
  <text x="304" y="362" fill="#ffffff" font-size="10" font-family="sans-serif" font-weight="700" text-anchor="middle">99</text>

  {/* Card 3: Users List */}
  <rect x="156" y="416" width="188" height="74" rx="16" fill="#1d202b" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1" />
  <text x="170" y="436" fill="#a0a5b5" font-size="9" font-family="sans-serif" font-weight="600">RECENT USERS</text>
  
  {/* Avatars on Screen */}
  <circle cx="180" cy="462" r="12" fill="#3b3f52" />
  <circle cx="210" cy="462" r="12" fill="#4a4f66" />
  <circle cx="240" cy="462" r="12" fill="#585e78" />
  
  <circle cx="180" cy="462" r="9" fill="#ff7a00" opacity="0.6" />
  <circle cx="210" cy="462" r="9" fill="#ff005c" opacity="0.6" />
  <circle cx="240" cy="462" r="9" fill="#7a00ff" opacity="0.6" />

  {/* Home indicator bar */}
  <rect x="210" y="500" width="80" height="4" rx="2" fill="#ffffff" fill-opacity="0.3" />

  {/* --- Hand Holding the Phone (Minimalist flat vector) --- */}
  {/* Arm/Wrist entering from bottom left */}
  <path d="M 0 600 C 60 520 120 440 180 430 L 220 540 L 100 600 Z" fill="url(#hand-grad)" stroke="#221b18" stroke-width="2" />
  {/* Palm back holding bottom-left/side of phone */}
  <path d="M 115 480 C 115 430 140 420 160 410 L 180 500 C 180 500 135 520 115 480 Z" fill="url(#hand-grad)" />

  {/* Left Side Fingers Wrapping Around */}
  {/* Index Finger */}
  <path d="M 125 180 C 105 180 100 200 115 210 L 138 212 C 144 212 144 180 138 180 Z" fill="#2d2621" stroke="#221b18" stroke-width="1.5" />
  <path d="M 132 180 C 122 180 120 195 130 200 Z" fill="#40352e" /> {/* Highlight */}
  
  {/* Middle Finger */}
  <path d="M 123 220 C 103 220 98 240 113 250 L 138 252 C 144 252 144 220 138 220 Z" fill="#29221e" stroke="#221b18" stroke-width="1.5" />
  
  {/* Ring Finger */}
  <path d="M 123 260 C 103 260 98 280 113 290 L 138 292 C 144 292 144 260 138 260 Z" fill="#251f1b" stroke="#221b18" stroke-width="1.5" />
  
  {/* Pinky Finger */}
  <path d="M 125 300 C 107 300 102 320 117 330 L 138 332 C 144 332 144 300 138 300 Z" fill="#201a17" stroke="#221b18" stroke-width="1.5" />

  {/* Right Side Thumb (supporting phone) */}
  <path d="M 370 330 C 390 330 395 350 380 360 L 355 362 C 350 362 350 330 355 330 Z" fill="#2d2621" stroke="#221b18" stroke-width="1.5" />

</svg>
